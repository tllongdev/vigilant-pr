name: CI

# Lint, type-check, and test on every push to main/develop and every PR.
# Mirrors the local `ruff check` / `mypy` / `pytest` gate so contributors see
# green checks. main is the protected release line; develop is the integration
# branch, and PRs promote develop -> main.

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (with dev extras)
        run: pip install -e '.[dev]'

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest -q
