<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Vigilant PR - AI code review, posted as you">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1424"/>
      <stop offset="1" stop-color="#0a0f1c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#2a3a63" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0a0f1c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4da3ff"/>
      <stop offset="1" stop-color="#a98bff"/>
    </linearGradient>
    <radialGradient id="iris" cx="0.42" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#1c3763"/>
      <stop offset="1" stop-color="#0c1830"/>
    </radialGradient>
    <clipPath id="eyeClip">
      <path d="M12 64 Q64 30 116 64 Q64 98 12 64 Z"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g opacity="0.9">
    <circle cx="1044" cy="150" r="7" fill="#ff5d5d"/>
    <circle cx="1080" cy="150" r="7" fill="#ffab4d"/>
    <circle cx="1116" cy="150" r="7" fill="#ffe15d"/>
  </g>

  <g transform="translate(110,205) scale(1.65)">
    <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#tile)"/>
    <rect x="0" y="0" width="128" height="128" rx="28" fill="#0b0f1a" opacity="0.06"/>
    <path d="M12 64 Q64 30 116 64 Q64 98 12 64 Z" fill="#f3f8ff"/>
    <circle cx="64" cy="64" r="23" fill="url(#iris)"/>
    <circle cx="64" cy="64" r="23" fill="none" stroke="#4da3ff" stroke-width="3.5"/>
    <circle cx="64" cy="64" r="15.5" fill="none" stroke="#7cc0ff" stroke-width="1.6" opacity="0.7"/>
    <circle cx="64" cy="64" r="8" fill="#05080f"/>
    <circle cx="58" cy="58" r="3.1" fill="#eaf2ff" opacity="0.92"/>
    <g clip-path="url(#eyeClip)">
      <line x1="24" y1="82" x2="104" y2="46" stroke="#4da3ff" stroke-width="2" opacity="0.35"/>
    </g>
    <path d="M12 64 Q64 30 116 64" fill="none" stroke="#0c1830" stroke-width="2.4" opacity="0.35" stroke-linecap="round"/>
  </g>

  <text x="410" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="104" font-weight="800" letter-spacing="-2">
    <tspan fill="#eef4ff">Vigilant</tspan><tspan dx="22" fill="url(#tile)">PR</tspan>
  </text>
  <text x="414" y="352" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="34" font-weight="500" letter-spacing="0.4" fill="#93a2bd">AI code review, posted as you - not a bot.</text>

  <line x1="410" y1="410" x2="1090" y2="410" stroke="#223049" stroke-width="1.5"/>
  <text x="410" y="462" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="30" fill="#7cc0ff">vigilant review &lt;pr-url&gt;</text>
  <text x="410" y="510" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="26" fill="#5a6b86">CLI  /  watcher daemon  /  Slack  /  Teams      by LongIntel</text>
</svg>
